<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Citiold RV - Ferretería Industrial </title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;600;700&family=Barlow+Condensed:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    /* Paleta de Alto Contraste Industrial */
    --bg-deep: #030712;        /* Fondo base casi negro */
    --bg-card: #0f172a;        /* Azul marino claro para que los productos resalten */
    --accent-blue: #3b82f6;    /* Azul brillante para interacción */
    --safety-orange: #fb923c;  /* Naranja de seguridad vibrante */
    --neon-orange: #ff7b00;    /* Naranja para precios (máximo contraste) */
    --text-pure: #ffffff;      /* Blanco puro para lectura clara */
    --text-muted: #94a3b8;     /* Gris azulado para detalles */
    --border-glow: #1e293b;    /* Color de borde para separación */
    --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
  }
  
  html{scroll-behavior:smooth}
  body{background:var(--bg-deep);color:var(--text-pure);font-family:'Barlow',sans-serif;overflow-x:hidden}

  /* NAVEGACIÓN */
  nav{
    position:fixed;top:0;left:0;right:0;z-index:1000;
    background:rgba(3, 7, 18, 0.95);
    border-bottom:4px solid var(--safety-orange);
    display:flex;align-items:center;justify-content:space-between;
    padding:0 3rem;height:70px;
    box-shadow: var(--shadow);
  }
  .logo{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:2px;color:var(--text-pure);cursor:pointer}
  .logo span{color:var(--safety-orange)}
  .nav-links{display:flex;list-style:none}
  .nav-links li a{
    padding:0 1.5rem;height:70px;line-height:70px;
    font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
    color:var(--text-muted);text-decoration:none;transition:0.3s;
  }
  .nav-links li a:hover, .nav-links li a.active{color:var(--safety-orange);background:rgba(255,255,255,0.03)}
  
  .nav-wish{
    background:var(--safety-orange);color:var(--bg-deep);
    padding:10px 20px;border:none;cursor:pointer;border-radius:4px;
    font-family:'Barlow Condensed',sans-serif;font-weight:700;display:flex;align-items:center;gap:8px;
    transition:0.3s;box-shadow: 0 4px 15px rgba(251, 146, 60, 0.3);
  }
  .nav-wish:hover{transform:scale(1.05);background:var(--neon-orange)}

  /* SECCIONES GENERALES */
  section{min-height:100vh;padding-top:100px;display:none;max-width:1400px;margin:0 auto}
  section.active{display:block}

  /* CARRUSEL DE INICIO */
  #inicio{padding-top:70px;max-width:100%}
  .carousel{position:relative;height:calc(100vh - 70px);overflow:hidden}
  .carousel-inner{display:flex;height:100%;transition:transform 0.6s cubic-bezier(0.4, 0, 0.2, 1)}
  .carousel-item{
    flex:0 0 100%;height:100%;background-size:cover;background-position:center;
    display:flex;align-items:center;padding:0 10%;position:relative;
  }
  .carousel-item::before{
    content:'';position:absolute;inset:0;
    background:linear-gradient(90deg, rgba(3,7,18,0.9) 20%, rgba(3,7,18,0.4) 100%);
  }
  .carousel-content{position:relative;z-index:2;max-width:700px}
  .hero-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(60px,10vw,120px);line-height:0.85;margin-bottom:1.5rem}
  .hero-title span{color:var(--safety-orange);text-shadow: 0 0 20px rgba(251,146,60,0.4)}
  .hero-sub{font-size:1.2rem;color:var(--text-muted);margin-bottom:2rem;border-left:4px solid var(--safety-orange);padding-left:20px}

  /* CATÁLOGO / PRODUCTOS */
  .section-header{padding:0 2rem;margin-bottom:3rem}
  .section-title{font-family:'Bebas Neue',sans-serif;font-size:64px;letter-spacing:2px}
  .section-title span{color:var(--safety-orange)}

  .filters{display:flex;gap:1rem;padding:0 2rem 2rem;flex-wrap:wrap}
  .filter-btn{
    background:var(--bg-card);border:1px solid var(--border-glow);color:var(--text-pure);
    padding:10px 25px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:700;
    text-transform:uppercase;transition:0.3s;
  }
  .filter-btn:hover, .filter-btn.active{background:var(--accent-blue);border-color:var(--accent-blue);box-shadow: 0 0 15px rgba(59, 130, 246, 0.4)}

  .products-grid{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
    gap:2.5rem;padding:0 2rem 5rem;
  }
  
  /* ESTILO VISTOSO DE LA TARJETA */
  .product-card{
    background:var(--bg-card);
    border:1px solid var(--border-glow);
    border-radius:12px;
    padding:1.5rem;
    transition:all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    display:flex;flex-direction:column;
    position:relative;
    box-shadow: var(--shadow);
  }
  .product-card:hover{
    transform:translateY(-10px);
    border-color:var(--safety-orange);
    box-shadow: 0 20px 40px rgba(0,0,0,0.6);
  }
  .product-image{
    width:100%;height:220px;
    background-color:#070b14;
    background-size:cover;background-position:center;
    border-radius:8px;margin-bottom:1.5rem;
    border:1px solid rgba(255,255,255,0.05);
  }
  .product-name{
    font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:700;
    color:var(--text-pure);margin-bottom:0.5rem;line-height:1.1;
    min-height:52px;
  }
  .product-price{
    font-family:'Bebas Neue',sans-serif;font-size:36px;
    color:var(--neon-orange);margin-bottom:1.5rem;
    display:flex;align-items:baseline;gap:8px;
  }
  .product-price small{font-family:'Barlow';font-size:14px;color:var(--text-muted)}
  
  .add-wish{
    width:100%;padding:14px;background:rgba(255,255,255,0.05);
    border:1px solid var(--accent-blue);color:var(--text-pure);
    font-family:'Barlow Condensed',sans-serif;font-weight:700;text-transform:uppercase;
    cursor:pointer;border-radius:6px;transition:0.3s;
    display:flex;align-items:center;justify-content:center;gap:10px;
  }
  .add-wish:hover{background:var(--accent-blue);box-shadow: 0 0 20px rgba(59, 130, 246, 0.5)}
  .add-wish.added{background:var(--accent-blue);color:white}

  /* LISTA DE DESEOS - MODIFICACIÓN DE CANTIDADES */
  .wish-item{
    background:var(--bg-card);margin-bottom:1.5rem;padding:1.5rem;
    border-radius:12px;border:1px solid var(--border-glow);
    display:grid;grid-template-columns:100px 1fr 180px 150px 50px;
    align-items:center;gap:2rem;
  }
  .wish-qty-control{
    display:flex;align-items:center;background:var(--bg-deep);
    border:1px solid var(--border-glow);border-radius:6px;overflow:hidden;
  }
  .qty-btn{
    width:40px;height:40px;border:none;background:none;color:white;cursor:pointer;font-size:18px;transition:0.2s;
  }
  .qty-btn:hover{background:var(--safety-orange);color:var(--bg-deep)}
  .qty-input{
    width:50px;text-align:center;background:none;border:none;color:white;font-weight:700;font-size:16px;
  }
  .wish-total-price{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--neon-orange);text-align:right}

  /* WHATSAPP Y TOTALES */
  .summary-card{
    background:var(--bg-card);padding:2.5rem;border-radius:15px;
    border-top:5px solid var(--safety-orange);margin-top:3rem;
  }
  .btn-wa{
    display:flex;align-items:center;justify-content:center;gap:15px;
    width:100%;padding:20px;background:#22c55e;color:white;
    font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;
    text-transform:uppercase;border:none;border-radius:8px;cursor:pointer;transition:0.3s;
  }
  .btn-wa:hover{background:#16a34a;transform:scale(1.02);box-shadow: 0 10px 30px rgba(34, 197, 94, 0.3)}

  @media(max-width:768px){
    .wish-item{grid-template-columns: 1fr 1fr; gap:1rem}
    .wish-item-icon{display:none}
    .nav-links{display:none}
  }
</style>
</head>
<body>

<nav>
  <div class="logo" onclick="showSection('inicio')">CITY<span>OLD</span> RV</div>
  <ul class="nav-links">
    <li><a href="#" class="active" onclick="showSection('inicio');return false">Inicio</a></li>
    <li><a href="#" onclick="showSection('menu');return false">Catálogo</a></li>
    <li><a href="#" onclick="showSection('nosotros');return false">Nosotros</a></li>
    <li><a href="#" onclick="showSection('contacto');return false">Contacto</a></li>
  </ul>
  <button class="nav-wish" onclick="showSection('deseos')">
    <i class="ti ti-shopping-cart"></i> MI LISTA
    <span id="badge" style="background:white;color:black;padding:2px 6px;border-radius:50%;font-size:12px;margin-left:5px">0</span>
  </button>
</nav>

<section id="inicio" class="active">
  <div class="carousel">
    <div class="carousel-inner" id="carouselInner">
      <div class="carousel-item" style="background-image: url('https://images.unsplash.com/photo-1581094794329-c8112a89af12?auto=format&fit=crop&q=80&w=1600')">
        <div class="carousel-content">
          <h1 class="hero-title">PODER <span>INDUSTRIAL</span></h1>
          <p class="hero-sub">Herramientas de alto rendimiento para proyectos que no aceptan errores.</p>
          <button class="btn-wa" style="width:auto; padding: 15px 40px" onclick="showSection('menu')">Explorar Catálogo</button>
        </div>
      </div>
      <div class="carousel-item" style="background-image: url('https://images.unsplash.com/photo-1504307651254-35680f356dfd?auto=format&fit=crop&q=80&w=1600')">
        <div class="carousel-content">
          <h1 class="hero-title">CONSTRUYE EL <span>FUTURO</span></h1>
          <p class="hero-sub">Materiales de construcción certificados con entrega inmediata en obra.</p>
        </div>
      </div>
    </div>
  </div>
</section>

<section id="menu">
  <div class="section-header">
    <h2 class="section-title">NUESTRO <span>CATÁLOGO</span></h2>
  </div>
  <div class="filters">
    <button class="filter-btn active" onclick="filterProducts('todo',this)">Ver Todo</button>
    <button class="filter-btn" onclick="filterProducts('herramientas',this)">Herramientas</button>
    <button class="filter-btn" onclick="filterProducts('construccion',this)">Materiales</button>
    <button class="filter-btn" onclick="filterProducts('electrico',this)">Eléctrico</button>
  </div>
  <div class="products-grid" id="productsGrid"></div>
</section>

<section id="deseos">
  <div class="section-header">
    <h2 class="section-title">TU <span>PEDIDO</span></h2>
  </div>
  <div id="wishContent" style="padding: 0 2rem"></div>
</section>

<section id="nosotros"><div class="section-header"><h2 class="section-title">SOBRE <span>NOSOTROS</span></h2></div></section>
<section id="contacto"><div class="section-header"><h2 class="section-title"><span>CONTACTO</span></h2></div></section>

<script>
const PRODUCTOS = [
  {id:1,nombre:'Taladro Percutor Industrial 800W',cat:'herramientas',precio:2850,img:'https://images.unsplash.com/photo-1504148455328-c376907d081c?auto=format&fit=crop&q=80&w=400'},
  {id:2,nombre:'Saco de Cemento Gris (50kg)',cat:'construccion',precio:195,img:'https://images.unsplash.com/photo-1518709268805-4e9042af9f23?auto=format&fit=crop&q=80&w=400'},
  {id:3,nombre:'Amoladora Angular 4-1/2"',cat:'herramientas',precio:1420,img:'https://images.unsplash.com/photo-1530124560676-58355e098482?auto=format&fit=crop&q=80&w=400'},
  {id:4,nombre:'Kit de Pinzas Eléctricas (3 piezas)',cat:'electrico',precio:680,img:'https://images.unsplash.com/photo-1581244276894-0f7457788331?auto=format&fit=crop&q=80&w=400'},
  {id:5,nombre:'Varilla Corrugada 3/8" (12m)',cat:'construccion',precio:165,img:'https://images.unsplash.com/photo-1533038590840-1cde6e668a91?auto=format&fit=crop&q=80&w=400'},
  {id:6,nombre:'Multímetro Digital Pro',cat:'electrico',precio:950,img:'https://images.unsplash.com/photo-1590212151175-e58edd96185b?auto=format&fit=crop&q=80&w=400'}
];

let wishlist = [];
let carouselIdx = 0;

function showSection(id){
  document.querySelectorAll('section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-links a').forEach(a=>a.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id==='deseos') renderWish();
  window.scrollTo(0,0);
}

// CARRUSEL AUTOMÁTICO
setInterval(() => {
  carouselIdx = (carouselIdx + 1) % 2;
  document.getElementById('carouselInner').style.transform = `translateX(-${carouselIdx * 100}%)`;
}, 5000);

// CATÁLOGO
function renderProducts(filter = 'todo'){
  const grid = document.getElementById('productsGrid');
  const filtered = filter === 'todo' ? PRODUCTOS : PRODUCTOS.filter(p=>p.cat === filter);
  
  grid.innerHTML = filtered.map(p=>{
    const inWish = wishlist.find(w=>w.id===p.id);
    return `
      <div class="product-card">
        <div class="product-image" style="background-image:url('${p.img}')"></div>
        <div class="product-name">${p.nombre}</div>
        <div class="product-price">$${p.precio.toLocaleString()} <small>MXN</small></div>
        <button class="add-wish ${inWish?'added':''}" onclick="toggleWish(${p.id})">
          <i class="ti ${inWish?'ti-check':'ti-plus'}"></i>
          ${inWish?'EN MI LISTA':'AGREGAR A LISTA'}
        </button>
      </div>
    `;
  }).join('');
}

function filterProducts(cat, btn){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderProducts(cat);
}

// LISTA DE DESEOS CON CANTIDADES
function toggleWish(id){
  const idx = wishlist.findIndex(w=>w.id===id);
  if(idx > -1){
    wishlist.splice(idx, 1);
  } else {
    const prod = PRODUCTOS.find(p=>p.id===id);
    wishlist.push({...prod, cantidad: 1});
  }
  updateBadge();
  renderProducts();
}

function updateBadge(){
  document.getElementById('badge').textContent = wishlist.length;
}

function updateQty(id, delta){
  const item = wishlist.find(w=>w.id===id);
  if(item){
    item.cantidad = Math.max(1, item.cantidad + delta);
    renderWish();
  }
}

function renderWish(){
  const cont = document.getElementById('wishContent');
  if(wishlist.length === 0){
    cont.innerHTML = `<div style="text-align:center; padding: 5rem 0">
      <i class="ti ti-shopping-cart-x" style="font-size:60px; color:var(--text-muted)"></i>
      <p style="color:var(--text-muted); margin-top:1rem">No has agregado productos a tu lista.</p>
    </div>`;
    return;
  }

  let totalGeneral = 0;
  const itemsHtml = wishlist.map(p=>{
    const subtotal = p.precio * p.cantidad;
    totalGeneral += subtotal;
    return `
      <div class="wish-item">
        <div class="product-image" style="height:60px; margin-bottom:0; background-image:url('${p.img}')"></div>
        <div class="product-name" style="font-size:18px; min-height:auto">${p.nombre}</div>
        <div class="wish-qty-control">
          <button class="qty-btn" onclick="updateQty(${p.id}, -1)">-</button>
          <div class="qty-input">${p.cantidad}</div>
          <button class="qty-btn" onclick="updateQty(${p.id}, 1)">+</button>
        </div>
        <div class="wish-total-price">$${subtotal.toLocaleString()}</div>
        <button onclick="toggleWish(${p.id});renderWish()" style="background:none; border:none; color:var(--text-muted); cursor:pointer">
          <i class="ti ti-trash" style="font-size:20px"></i>
        </button>
      </div>
    `;
  }).join('');

  const msg = encodeURIComponent(
    "Hola Citiold RV, deseo una cotización:\n\n" + 
    wishlist.map(p=>`- ${p.nombre} (Cant: ${p.cantidad})`).join("\n") +
    `\n\nTotal estimado: $${totalGeneral.toLocaleString()}`
  );

  cont.innerHTML = `
    <div>${itemsHtml}</div>
    <div class="summary-card">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:2rem">
        <span style="font-family:'Barlow Condensed'; font-weight:700; font-size:20px">TOTAL ESTIMADO</span>
        <span style="font-family:'Bebas Neue'; font-size:48px; color:var(--safety-orange)">$${totalGeneral.toLocaleString()} MXN</span>
      </div>
      <button class="btn-wa" onclick="window.open('https://wa.me/527712345678?text=${msg}')">
        <i class="ti ti-brand-whatsapp"></i> ENVIAR PEDIDO POR WHATSAPP
      </button>
    </div>
  `;
}

// Inicializar
renderProducts();
</script>

</body>
</html>
